<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pouch Label Repair System</title>

<style>

/* ========================= */
/* UI */
/* ========================= */

body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

.group {
    border: 1px solid #ccc;
    padding: 12px;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 6px;
    margin: 4px 0;
    box-sizing: border-box;
    font-size: 12px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    border: 1px solid #ccc;
    padding: 6px;
    font-size: 12px;
}

button {
    padding: 10px 14px;
    margin-top: 10px;
    cursor: pointer;
}

/* ========================= */
/* LABEL PRINT STYLE */
/* ========================= */

@page {
    size: 7cm 3.5cm;
    margin: 0;
}

.print-label {
    width: 7cm;
    height: 3.5cm;
    padding: 2mm;
    box-sizing: border-box;

    display: flex;
    flex-direction: column;
    justify-content: space-between;

    font-size: 8pt;
    page-break-after: always;
}

.header {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    font-weight: bold;
}

.patient {
    font-size: 14px;
    font-weight: bold;
}

.med {
    display: grid;
    grid-template-columns: 6mm 1fr;
    column-gap: 2mm;
}

.dose {
    text-align: right;
    font-weight: bold;
    font-family: monospace;
}

.footer {
    display: flex;
    justify-content: space-between;
    font-size: 7pt;
    border-top: 1px solid #999;
    padding-top: 1mm;
}

@media print {
    body { margin: 0; }
    .controls { display: none; }
}

</style>
</head>

const TIMES = ["Morning","Breakfast","Lunch","Tea","Dinner","Night"];
const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

/* ========================= */
/* BUILD UI */
/* ========================= */


function addGroup() {

    const uid = Math.random().toString(36).substr(2, 9);

    const div = document.createElement("div");
    div.className = "group";

    div.innerHTML = `

        <label>Time</label>
        <input list="times_${uid}">
        <datalist id="times_${uid}">
            ${TIMES.map(t=>`<option value="${t}">`).join("")}
        </datalist>

        <label>Day</label>
        <input list="days_${uid}">
        <datalist id="days_${uid}">
            ${DAYS.map(d=>`<option value="${d}">`).join("")}
        </datalist>

        <label>Patient (Surname, Forename)</label>
        <input list="patients_${uid}">
        <datalist id="patients_${uid}">
            ${PATIENTS.map(p=>`<option value="${p}">`).join("")}
        </datalist>

        <label>Footer</label>
        <input class="footer" placeholder="1/116">

        <button onclick="addDrug(this)">+ Add Drug</button>

        <table>
            <thead>
                <tr><th>Dose</th><th>Drug</th></tr>
            </thead>
            <tbody></tbody>
        </table>

    `;

    document.getElementById("groups").appendChild(div);
}
function addDrug(btn) {

    const tbody = btn.parentElement.querySelector("tbody");

    const row = document.createElement("tr");

    row.innerHTML = `
        <td><input placeholder="1"></td>
        <td><input list="drugList"></td>
    `;

    tbody.appendChild(row);
}

document.body.insertAdjacentHTML("beforeend", `
<datalist id="drugList">
${DRUGS.map(d=>`<option value="${d}">`).join("")}
</datalist>
`);

        justify-content:space-between;
        font-size:7pt;
        border-top:1px solid #999;
        padding-top:1mm;
    }
    </style>

    </head>
    <body>
    `;

    groups.forEach(g => {

        const inputs = g.querySelectorAll("input");

        const time = inputs[0].value;
        const day = inputs[1].value;

        const patient = inputs[2].value || ",";
        const [surname, forename] = patient.split(",");

        const footer = g.querySelector(".footer").value || "";

        const rows = g.querySelectorAll("tbody tr");

        const drugs = [];

        rows.forEach(r => {

            drugs.push({
                dose: r.querySelectorAll("input")[0].value,
                drug: r.querySelectorAll("input")[1].value
            });

        });

        html += `
        <div class="label">

            <div>
                <div class="header">
                    <div>${time}</div>
                    <div>${day}</div>
                </div>

                <div class="patient">
                    ${surname}, ${forename}
                </div>

                <div>
                ${drugs.map(d => `
                    <div class="med">
                        <div class="dose">${d.dose}</div>
                        <div>${d.drug}</div>
                    </div>
                `).join("")}
                </div>
            </div>

            <div class="footer">
                <div>Prepared by Amiry & Gilbride HUB</div>
                <div>${footer}</div>
            </div>

        </div>
        `;

    });

    html += `
    <script>
        window.onload = function () {
            window.print();
        }
    <\/script>
    </body></html>
    `;

    win.document.write(html);
    win.document.close();

}

</script>

</body>
</html>
